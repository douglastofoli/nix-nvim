name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto
            cores = 0
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      # One invocation: builds packages + runs all flake checks (avoid triple Neovim build).
      - name: Flake check
        run: nix flake check --print-build-logs

      # Pure eval: same Neovim as the flake (no import <nixpkgs> / channel download).
      - name: Verify package name
        run: nix eval --raw '.#packages.x86_64-linux.neovim.name'

      # Overlay uses flake-locked nixpkgs — not <nixpkgs> from the channel.
      - name: Verify overlay against locked nixpkgs
        run: |
          nix eval --impure --raw --expr '
            let
              flake = builtins.getFlake (toString ./.);
              pkgs = import flake.inputs.nixpkgs {
                system = "x86_64-linux";
                overlays = [ flake.overlays.default ];
              };
            in
              pkgs.neovim.name
          '
